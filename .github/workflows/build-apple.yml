name: build-apple

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  apple-gomobile:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'
          cache: true

      - name: Show environment
        run: |
          python3 --version
          go version
          xcodebuild -version
          xcrun --version
          xcodebuild -showsdks || true
          xcrun simctl list runtimes || true

      - name: Build apple gomobile
        run: |
          python3 build/main.py apple gomobile
          test -d LibXray.xcframework

      - name: Upload gomobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: libxray-apple-gomobile
          path: LibXray.xcframework
          if-no-files-found: error

  apple-go:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'
          cache: true

      - name: Show environment
        run: |
          python3 --version
          go version
          xcodebuild -version
          xcrun --version
          xcodebuild -showsdks || true
          xcrun simctl list runtimes || true

      - name: Build apple go
        run: |
          python3 build/main.py apple go
          test -d LibXray.xcframework

      - name: Upload go artifact
        uses: actions/upload-artifact@v4
        with:
          name: libxray-apple-go
          path: LibXray.xcframework
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    needs:
      - apple-gomobile
      - apple-go

    steps:
      - name: Merge artifacts into one downloadable package
        uses: actions/upload-artifact/merge@v4
        with:
          name: libxray-apple
          pattern: libxray-apple-*
          separate-directories: true
          delete-merged: false